<style>
  :root{
    --rouge:#a30402;
    --rouge-fonce:#7c0301;
    --neutre:#f3f4f6;
    --neutre-bord:#e6e7e9;
    --encre:#1c1917;
    --gris:#5c554d;
    --gris-clair:#8a857c;
    --gris-tres-clair:#a29c92;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:#eceae4;
    font-family:"Public Sans",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    color:var(--encre);
    padding:24px;
  }
  a{color:var(--rouge)}
  a:hover{color:var(--rouge-fonce)}

  .page{
    width:210mm;
    min-height:297mm;
    margin:0 auto;
    background:#fff;
    box-shadow:0 22px 55px -24px rgba(0,0,0,.42);
    padding:16mm 15mm;
  }

  .head{display:flex;justify-content:space-between;align-items:center;gap:16px}
  .head-brand{display:flex;align-items:center;flex:none}
  .logo-head{width:215px;height:48px;flex:none;display:block}

  .head-ids{display:flex;gap:9px;flex:none}
  .id-block{text-align:right}
  .id-label{font:600 7.5px "IBM Plex Mono",monospace;letter-spacing:.14em;color:var(--gris-clair);text-transform:uppercase}
  .id-box{background:var(--neutre);border:1px solid var(--rouge);border-radius:4px;padding:4px 11px;margin-top:3px;font:600 12px "IBM Plex Mono",monospace;color:var(--rouge);white-space:nowrap}
  .id-box.ref{background:var(--rouge);color:#fff;border-color:var(--rouge)}
  .rule{height:2px;background:var(--rouge);margin:14px 0 16px}

  .grid{display:grid;gap:12px}
  .g-2{grid-template-columns:1.4fr 1fr}
  .g-3{grid-template-columns:1fr 1fr 1fr}
  .g-half{grid-template-columns:1fr 1fr}

  .panel{background:var(--neutre);border-radius:10px;padding:13px 15px}
  .panel-title{font:600 8.5px "IBM Plex Mono",monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--rouge);margin-bottom:7px}
  .kv{font-family:"IBM Plex Mono",monospace;font-size:9.5px;line-height:1.8;color:var(--gris)}
  .kv b{color:var(--encre);font-weight:600}
  .body-txt{font-size:10.5px;line-height:1.6;color:var(--gris)}
  .body-txt b{color:var(--encre)}

  .verdict{display:flex;gap:14px;align-items:center}
  .verdict-kicker{font:600 9.5px "IBM Plex Mono",monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--gris-clair)}
  .verdict-title{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:24px;line-height:1.15;color:var(--rouge);margin-top:5px}
  .verdict-title.refuse{color:var(--encre)}
  .verdict-sub{font-size:10.5px;line-height:1.45;color:var(--gris);margin-top:4px}
  .verdict-src{font-family:"IBM Plex Mono",monospace;font-size:8px;line-height:1.6;color:var(--gris-clair);margin-top:6px;padding-top:5px;border-top:1px solid var(--neutre-bord)}
  .verdict-src b{color:var(--gris);font-weight:600}
  .panel-src{font-family:"IBM Plex Mono",monospace;font-size:7.5px;letter-spacing:.04em;color:var(--gris-tres-clair);margin-top:7px;padding-top:5px;border-top:1px solid var(--neutre-bord)}

  /* Sceau d'état : porte le VERDICT, pas la marque. */
  .seal{flex:none;position:relative;width:68px;height:68px}
  .seal-logo{width:68px;height:68px;display:block}
  .seal-badge{
    position:absolute;right:-3px;bottom:-3px;
    width:23px;height:23px;border-radius:50%;
    background:var(--rouge);border:2px solid #fff;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:13px;line-height:1;
  }
  .seal-badge.refuse{background:var(--gris-clair)}

  .score{text-align:center}
  .score-num{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:36px;line-height:1}
  .score-den{font-size:14px;color:#b0aa9f}
  .score-label{display:inline-block;margin-top:4px;background:var(--rouge);color:#fff;border-radius:5px;padding:3px 12px;font-weight:700;font-size:11.5px}
  .score-note{font-size:9px;line-height:1.45;color:var(--gris-clair);margin-top:6px}

  .media{height:190px;border-radius:6px;background-image:repeating-linear-gradient(135deg,var(--neutre-bord) 0 8px,var(--neutre) 8px 16px);display:flex;align-items:center;justify-content:center;background-size:cover;background-position:center}
  .media span{font:500 9px "IBM Plex Mono",monospace;color:var(--gris-tres-clair);text-align:center;padding:0 8px}
  .media-cap{font:600 8px "IBM Plex Mono",monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--gris-clair);margin-bottom:5px}
  .media-sub{font-family:"IBM Plex Mono",monospace;font-size:8.5px;line-height:1.5;color:var(--gris);margin-top:6px}
  .media-sub b{color:var(--encre);font-weight:600}

  .ref-band{display:flex;align-items:center;gap:13px;margin-top:12px;background:var(--neutre);border-left:3px solid var(--rouge);border-radius:0 8px 8px 0;padding:11px 15px}
  .ref-band-txt{font-size:10px;line-height:1.55;color:var(--gris);flex:1}
  .ref-band-txt b{color:var(--encre)}
  .ref-code{font:700 15px "IBM Plex Mono",monospace;color:var(--rouge);letter-spacing:.06em;white-space:nowrap}

  .foot{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-top:14px;padding-top:12px;border-top:1px solid var(--neutre-bord)}
  .foot-txt{font-size:10px;line-height:1.7;color:var(--gris);flex:1}
  .foot-site{flex:none;font:700 12px "IBM Plex Mono",monospace;letter-spacing:.1em;color:var(--rouge);text-align:center;padding:0 8px}
  .foot-txt b{color:var(--encre)}
  .foot-qr{display:flex;align-items:center;gap:9px;flex:none}
  .qr-cap{font:600 7.5px "IBM Plex Mono",monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--gris-clair);text-align:right;line-height:1.6}
  .qr{width:52px;height:52px;border-radius:6px;background-image:repeating-conic-gradient(var(--encre) 0 25%,var(--neutre) 0 50%);background-size:8px 8px;flex:none}

  @media print{
    body{background:#fff;padding:0}
    .page{box-shadow:none;width:auto;min-height:auto;margin:0}
    @page{size:A4;margin:12mm}
  }
</style>
</head>
<body>
  <div class="page" id="certificat"></div>

<script>
  // Échappement OBLIGATOIRE : demandeur.* et bien.* viennent du tunnel.
  const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({
    "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
  }[c]));

  const scoreLabel = v =>
    v >= 75 ? "Vue exceptionnelle" :
    v >= 60 ? "Excellente vue" : null;

  const kvRows = pairs => pairs
    .map(([k, val]) => `${esc(k)}&nbsp;: <b>${esc(val)}</b>`)
    .join("<br>");

  const mediaBox = (m) => m.src
    ? `<div class="media" style="background-image:url('${esc(m.src)}')"></div>`
    : `<div class="media"><span>${esc(m.legende)}</span></div>`;

  function render(c){
    const label = scoreLabel(c.score.valeur);
    const certifie = c.verdict.certifie === true;
    const verdictTxt = certifie ? "Sans Vis-à-Vis® certifié" : "Non certifié";

    // Le LOGO porte la marque. La pastille porte le verdict.
    const seal = `
      <div class="seal">
        <img class="seal-logo" src="${LOGO_ROND}" alt="Sans Vis-à-Vis®">
        <div class="seal-badge ${certifie ? "" : "refuse"}">${certifie ? "✓" : "—"}</div>
      </div>`;

    const scoreBlock = label
      ? `<div class="score-label">${esc(label)}</div>`
      : `<div class="score-note">${esc(c.score.note)}</div>`;

    const photoBox = c.photo.src
      ? `<div class="media" style="background-image:url('${esc(c.photo.src)}')"></div>`
      : `<div class="media"><span>photo de la vue<br>${esc(c.photo.champ)}</span></div>`;

    document.getElementById("certificat").innerHTML = `
      <div class="head">
        <div class="head-brand">
          <img class="logo-head" src="${LOGO_LONG}" alt="L'immobilier Sans Vis-à-Vis®">
        </div>
        <div class="head-ids">
          <div class="id-block">
            <div class="id-label">N° de certificat</div>
            <div class="id-box">${esc(c.numero)}</div>
          </div>
          <div class="id-block">
            <div class="id-label">Réf. publique</div>
            <div class="id-box ref">${esc(c.reference)}</div>
          </div>
        </div>
      </div>
      <div class="rule"></div>

      <div class="grid g-2">
        <div class="panel verdict">
          ${seal}
          <div>
            <div class="verdict-kicker">Résultat de l'analyse</div>
            <div class="verdict-title ${certifie ? "" : "refuse"}">${esc(verdictTxt)}</div>
          </div>
        </div>
        <div class="panel score">
          <div class="verdict-kicker">Score global</div>
          <div style="display:flex;align-items:baseline;gap:3px;justify-content:center;margin-top:2px">
            <span class="score-num">${esc(c.score.valeur)}</span><span class="score-den">/100</span>
          </div>
          ${scoreBlock}
        </div>
      </div>

      <div class="grid g-half" style="margin-top:12px">
        <div class="panel">
          <div class="panel-title">Demandeur</div>
          <div class="body-txt"><b>${esc(c.demandeur.nom)}</b> · ${esc(c.demandeur.adresse)}<br>${esc(c.demandeur.email)} · ${esc(c.demandeur.telephone)}</div>
        </div>
        <div class="panel">
          <div class="panel-title">Identification du bien</div>
          <div class="body-txt">${esc(c.bien.adresse)} · Cadastre&nbsp;: ${esc(c.bien.cadastre)}<br>${esc(c.bien.type)} · ${esc(c.bien.usage)}</div>
        </div>
      </div>

      <div class="panel" style="margin-top:12px">
        <div class="panel-title">Empreinte géométrique unique du bien</div>
        <div class="grid g-3">
          <div><div class="media-cap" style="color:var(--gris-clair)">Coordonnées</div><div class="kv">${kvRows(c.empreinte.coordonnees)}</div></div>
          <div><div class="media-cap" style="color:var(--gris-clair)">Position de vue</div><div class="kv">${kvRows(c.empreinte.position)}</div></div>
          <div><div class="media-cap" style="color:var(--gris-clair)">Caractéristiques</div><div class="kv">${kvRows(c.empreinte.caracteristiques)}</div></div>
        </div>
      </div>

      <div class="grid g-3" style="margin-top:12px">
        <div class="panel">
          <div class="panel-title">Résultat détaillé</div>
          <div class="kv">${kvRows(c.analyse.resultat)}</div>
        </div>
        <div class="panel">
          <div class="panel-title">Qualité de vue</div>
          <div class="kv">${kvRows(c.analyse.qualiteVue)}</div>
        </div>
        <div class="panel">
          <div class="panel-title">Nuisances visuelles</div>
          <div class="kv">${kvRows(c.analyse.nuisances)}</div>
        </div>
      </div>

      <div class="grid g-half" style="margin-top:12px">
        <div class="panel">
          <div class="media-cap">Photo de la vue</div>
          ${photoBox}
          <div class="media-sub">Azimut&nbsp;: <b>${esc(c.photo.azimut)}</b> · Champ&nbsp;: <b>${esc(c.photo.champ)}</b> · Placement du point&nbsp;: <b>${esc(c.photo.mode)}</b></div>
        </div>
        <div class="panel">
          <div class="media-cap">Carte de localisation</div>
          ${mediaBox(c.carte)}
          <div class="media-sub">Portée d'analyse&nbsp;: <b>${esc(c.porteeAnalyse)}</b> · Seuil de verdict&nbsp;: <b>40 m</b></div>
        </div>
      </div>

      <div class="ref-band">
        <div class="ref-band-txt">
          <b>Référence à reprendre dans votre annonce.</b> Pour rattacher ce certificat au bien publié,
          indiquez cette référence dans le texte de votre annonce. Toute personne pourra alors vérifier
          sur <b>${esc(c.urlVerification)}</b> que l'analyse provient bien de nos services et correspond
          à l'annonce consultée.
        </div>
        <div class="ref-code">${esc(c.reference)}</div>
      </div>

      <div class="foot">
        <div class="foot-txt">Date d'émission&nbsp;: <b>${esc(c.emission)}</b> · Date d'analyse&nbsp;: <b>${esc(c.dateAnalyse)}</b> · Analyse géométrique&nbsp;: <b>${esc(c.porteeAnalyse)}</b><br>${esc(c.piedDePage)}</div>
        <div class="foot-site">${esc(c.siteWeb)}</div>
        <div class="foot-qr">
          <div class="qr-cap">Vérifier<br>ce certificat</div>
          <div class="qr" title="Vérification"></div>
        </div>
      </div>
    `;
  }

  render(certificat);
</script>
</body>
</html>
